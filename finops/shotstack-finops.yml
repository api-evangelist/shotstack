meters:
- name: rendered_minutes
  description: Minutes of video, image, or audio rendered, the primary credit-metered unit (1 credit = 1 minute).
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - api
  - resolution
- name: generated_images
  description: Images rendered, metered at 10 images per credit.
  unit: images
  aggregation: sum
  dimensions:
  - account
  - api
- name: ai_generated_assets
  description: AI assets generated via the Create API (text-to-speech, text-to-image, image-to-video), drawing on the credit balance.
  unit: assets
  aggregation: sum
  dimensions:
  - account
  - provider
  - type
- name: overage_minutes
  description: Rendered minutes beyond the monthly Subscription allowance, billed at a 30% premium.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
- name: setup_fee
  description: One-time $75 Pay-As-You-Go account setup fee.
  unit: charge
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track credit consumption per API key and per render in the Shotstack dashboard; inspect minutes burned by resolution.
- name: Allocation
  description: Issue distinct API keys per workload/team and map credit burn to internal cost centers.
- name: Optimization
  description: Render at the lowest acceptable resolution and fps, reuse templates to avoid redundant renders, trim clips to needed length, and pick Subscription over PAYG once monthly volume is predictable.
- name: Accountability
  description: Assign owners per project/key; review credit and overage spend monthly against budget, and forecast High Volume thresholds (50,000 min/yr).
