description: >-
  FinOps view of Shotstack spend. Shotstack bills on rendered output duration,
  metered in credits where 1 credit equals 1 minute of rendered video or 10
  generated images. Pay-As-You-Go bills $0.30 per rendered minute from prepaid
  credit packs (plus a one-time $75 setup fee); the Subscription plan bills
  $0.20 per rendered minute from a monthly credit base with overages at a 30%
  premium. AI Create assets, ingest, and serving draw on the same credit model,
  and High Volume / Enterprise moves to negotiated quote-based rates.
notes: >-
  Per-minute rates and credit-pack sizes are subject to change; verify against
  the Shotstack pricing page during reconciliation. Output resolution caps
  (1080p on PAYG/Subscription, 4K on High Volume) influence effective cost.
